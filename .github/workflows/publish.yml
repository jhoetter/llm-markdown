name: Publish to PyPI

on:
  release:
    types: [published]
  workflow_dispatch:
  push:
    tags:
      - "v*"

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    environment:
      name: pypi

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[all,test]" build twine

      - name: Run unit tests
        run: pytest -m "not integration"

      - name: Build package
        run: python -m build --sdist --wheel --outdir dist_publish

      - name: Check distribution metadata
        run: python -m twine check dist_publish/*

      - name: Publish package distributions to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist_publish/
